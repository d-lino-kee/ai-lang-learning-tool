# ═══════════════════════════════════════════════════════════════════
#  LinguaBlob CI Pipeline
#  Runs: lint → typecheck → unit tests → build → integration tests
#  Fails on any accessibility violation.
# ═══════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_USER: linguablob
  DB_PASSWORD: ci_test_password
  DB_NAME: linguablob_test
  JWT_SECRET: ci-test-secret-not-for-production

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Unit tests
        run: npm test

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: linguablob_test
          MYSQL_USER: linguablob
          MYSQL_PASSWORD: ci_test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Seed data
        run: npm run seed

      - name: Integration tests
        run: npm run test:integration

  e2e-accessibility:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'pull_request'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: linguablob_test
          MYSQL_USER: linguablob
          MYSQL_PASSWORD: ci_test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run migrations & seed
        run: |
          npm run migrate
          npm run seed

      - name: Start backend
        run: npm run dev &
        env:
          PORT: 3001

      # Note: In a real setup, you'd also start the frontend dev server here
      # - name: Start frontend
      #   run: cd ../frontend && npm run dev &

      - name: Wait for services
        run: npx wait-on http://localhost:3001/health --timeout 30000

      - name: Run E2E + accessibility tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:5173

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
